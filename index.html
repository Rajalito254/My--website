<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chartify AI \u2014 Professional Trading Analysis</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#040810;--bg2:#080f1c;--card:#0c1528;--card2:#101d35;
  --border:#162040;--border2:#1e2d50;
  --accent:#00e5ff;--accent2:#7b61ff;
  --green:#00e676;--red:#ff1744;--gold:#ffd600;
  --text:#e2eaff;--muted:#4a6080;--muted2:#7a95c0;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Outfit',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 60% 40% at 10% 20%,rgba(0,229,255,0.05) 0%,transparent 70%),radial-gradient(ellipse 50% 50% at 90% 80%,rgba(123,97,255,0.05) 0%,transparent 70%);pointer-events:none;z-index:0;}
::-webkit-scrollbar{width:4px;}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:4px;}

/* HEADER */
header{position:sticky;top:0;z-index:200;background:rgba(4,8,16,0.95);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:0 16px;}
.hdr{display:flex;align-items:center;justify-content:space-between;height:56px;max-width:480px;margin:0 auto;}
.logo{display:flex;align-items:center;gap:10px;}
.logo-mark{width:38px;height:38px;background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;}
.logo-txt{font-size:18px;font-weight:800;}
.logo-txt span{color:var(--accent);}
.live-pill{display:flex;align-items:center;gap:5px;background:rgba(0,230,118,0.1);border:1px solid rgba(0,230,118,0.3);border-radius:20px;padding:4px 10px;font-size:11px;font-weight:600;color:var(--green);}
.ldot{width:6px;height:6px;background:var(--green);border-radius:50%;box-shadow:0 0 8px var(--green);animation:blink 1.5s infinite;}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:0.3;}}

/* TICKER */
.ticker{background:var(--bg2);border-bottom:1px solid var(--border);overflow:hidden;height:36px;display:flex;align-items:center;}
.tick-track{display:flex;gap:32px;animation:scroll 35s linear infinite;width:max-content;}
@keyframes scroll{0%{transform:translateX(0);}100%{transform:translateX(-50%);}}
.ti{display:flex;align-items:center;gap:6px;font-family:'JetBrains Mono',monospace;font-size:11px;white-space:nowrap;}
.ts{color:var(--accent);font-weight:700;}
.up{color:var(--green);}
.dn{color:var(--red);}

/* TABS */
.tabs{display:flex;background:var(--bg2);border-bottom:1px solid var(--border);position:sticky;top:56px;z-index:150;}
.tab{flex:1;padding:10px 4px;background:transparent;border:none;color:var(--muted2);font-family:'Outfit',sans-serif;font-size:11px;font-weight:600;cursor:pointer;transition:all 0.2s;display:flex;flex-direction:column;align-items:center;gap:3px;border-bottom:2px solid transparent;}
.tab .ti2{font-size:16px;}
.tab.on{color:var(--accent);border-bottom-color:var(--accent);}

/* CONTENT */
.page{max-width:480px;margin:0 auto;padding:16px;}
.panel{display:none;}
.panel.on{display:block;}

/* HELPERS */
.lbl{font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:10px;display:flex;align-items:center;gap:8px;}
.lbl::after{content:'';flex:1;height:1px;background:var(--border);}
.card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:16px;margin-bottom:12px;}

/* PAIR GRID */
.pair-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:16px;}
.pair-btn{padding:10px 4px;background:var(--card);border:1px solid var(--border);border-radius:10px;font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--muted2);cursor:pointer;transition:all 0.2s;text-align:center;}
.pair-btn b{display:block;font-weight:700;margin-bottom:2px;}
.pair-btn small{font-size:9px;color:var(--muted);}
.pair-btn.on{background:rgba(0,229,255,0.08);border-color:var(--accent);color:var(--accent);}

/* TIMEFRAME */
.tf-row{display:flex;gap:6px;margin-bottom:16px;}
.tf{flex:1;padding:7px 4px;background:var(--card);border:1px solid var(--border);border-radius:8px;font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--muted2);cursor:pointer;transition:all 0.2s;text-align:center;}
.tf.on{background:rgba(123,97,255,0.15);border-color:var(--accent2);color:var(--accent2);}

/* UPLOAD */
.upload{background:var(--card);border:1.5px dashed var(--border2);border-radius:16px;padding:28px 16px;text-align:center;cursor:pointer;transition:all 0.3s;margin-bottom:12px;position:relative;}
.upload:hover,.upload.drag{border-color:var(--accent);background:rgba(0,229,255,0.04);}
.upload input{display:none;}
#prev{width:100%;border-radius:12px;margin-top:14px;display:none;border:1px solid var(--border);}
.rm{position:absolute;top:10px;right:10px;width:28px;height:28px;border-radius:50%;background:rgba(255,23,68,0.2);border:1px solid var(--red);color:var(--red);font-size:14px;cursor:pointer;display:none;align-items:center;justify-content:center;}

/* OPTIONS */
.opts{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px;}
.opt{display:flex;align-items:center;gap:8px;background:var(--card);border:1px solid var(--border);border-radius:10px;padding:10px;cursor:pointer;transition:all 0.2s;}
.opt.on{border-color:var(--accent2);background:rgba(123,97,255,0.08);}
.opt-lbl{font-size:11px;font-weight:600;color:var(--muted2);}
.opt.on .opt-lbl{color:var(--accent2);}
.tgl{width:24px;height:14px;border-radius:7px;background:var(--border2);margin-left:auto;position:relative;transition:all 0.2s;flex-shrink:0;}
.opt.on .tgl{background:var(--accent2);}
.tgl::after{content:'';position:absolute;width:10px;height:10px;border-radius:50%;background:white;top:2px;left:2px;transition:all 0.2s;}
.opt.on .tgl::after{left:12px;}

/* SCAN BTN */
.scan{width:100%;padding:18px;background:linear-gradient(135deg,var(--accent),var(--accent2));border:none;border-radius:14px;color:#040810;font-family:'Outfit',sans-serif;font-size:16px;font-weight:800;cursor:pointer;transition:all 0.3s;margin-bottom:20px;display:flex;align-items:center;justify-content:center;gap:8px;}
.scan:hover{transform:translateY(-2px);box-shadow:0 10px 40px rgba(0,229,255,0.3);}
.scan:disabled{opacity:0.4;cursor:not-allowed;transform:none;box-shadow:none;}

/* LOADER */
.loader{display:none;margin-bottom:20px;}
.loader.on{display:block;}
.ldr-card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:24px;text-align:center;}
.ring{width:48px;height:48px;margin:0 auto 14px;border:3px solid var(--border);border-top-color:var(--accent);border-right-color:var(--accent2);border-radius:50%;animation:spin 0.9s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.steps{display:flex;flex-direction:column;gap:6px;margin-top:14px;}
.step{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--muted);padding:6px 10px;background:var(--card2);border-radius:8px;}
.sdot{width:6px;height:6px;border-radius:50%;background:var(--border2);flex-shrink:0;}
.step.done .sdot{background:var(--green);}
.step.act .sdot{background:var(--accent);box-shadow:0 0 8px var(--accent);animation:blink 0.8s infinite;}
.step.done{color:var(--text);}
.step.act{color:var(--accent);}

/* RESULT */
.result{display:none;}
.result.on{display:block;animation:rise 0.4s ease;}
@keyframes rise{from{opacity:0;transform:translateY(16px);}to{opacity:1;transform:translateY(0);}}

/* SIGNAL CARD */
.sig-card{border-radius:16px;padding:20px;margin-bottom:12px;position:relative;overflow:hidden;}
.sig-card.buy{background:linear-gradient(135deg,rgba(0,230,118,0.12),rgba(0,230,118,0.04));border:1px solid rgba(0,230,118,0.3);}
.sig-card.sell{background:linear-gradient(135deg,rgba(255,23,68,0.12),rgba(255,23,68,0.04));border:1px solid rgba(255,23,68,0.3);}
.sig-card.hold{background:linear-gradient(135deg,rgba(255,214,0,0.12),rgba(255,214,0,0.04));border:1px solid rgba(255,214,0,0.3);}
.sig-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
.sig-name{font-size:24px;font-weight:800;}
.sig-name.buy{color:var(--green);}
.sig-name.sell{color:var(--red);}
.sig-name.hold{color:var(--gold);}
.conf-wrap{text-align:right;}
.conf-num{font-family:'JetBrains Mono',monospace;font-size:26px;font-weight:700;}
.conf-lbl{font-size:10px;color:var(--muted2);text-transform:uppercase;letter-spacing:1px;}
.cbar{width:100%;height:6px;background:var(--border);border-radius:3px;overflow:hidden;margin-bottom:12px;}
.cfill{height:100%;border-radius:3px;transition:width 1s ease;}
.buy .cfill{background:linear-gradient(90deg,var(--green),#00ff9f);}
.sell .cfill{background:linear-gradient(90deg,var(--red),#ff6b6b);}
.hold .cfill{background:linear-gradient(90deg,var(--gold),#ffe57a);}
.sig-tags{display:flex;gap:6px;flex-wrap:wrap;}
.stag{padding:3px 10px;border-radius:20px;font-size:10px;font-weight:700;font-family:'JetBrains Mono',monospace;}
.stag-blue{background:rgba(0,229,255,0.1);color:var(--accent);border:1px solid rgba(0,229,255,0.2);}
.stag-purple{background:rgba(123,97,255,0.1);color:var(--accent2);border:1px solid rgba(123,97,255,0.2);}
.stag-green{background:rgba(0,230,118,0.1);color:var(--green);border:1px solid rgba(0,230,118,0.2);}

/* LEVELS */
.lvl-row{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border);}
.lvl-row:last-child{border:none;}
.lvl-l{display:flex;align-items:center;gap:8px;}
.lvl-dot{width:8px;height:8px;border-radius:50%;}
.lvl-lbl{font-size:12px;color:var(--muted2);}
.lvl-r{display:flex;align-items:center;gap:8px;}
.lvl-val{font-family:'JetBrains Mono',monospace;font-size:14px;font-weight:700;}
.badge{font-size:10px;padding:2px 7px;border-radius:4px;font-weight:700;}

/* INDICATORS GRID */
.ind-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px;}
.ind{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:12px;}
.ind-name{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:6px;}
.ind-val{font-family:'JetBrains Mono',monospace;font-size:15px;font-weight:700;margin-bottom:4px;}
.pill{font-size:10px;font-weight:700;padding:2px 8px;border-radius:10px;display:inline-block;}
.bull{background:rgba(0,230,118,0.1);color:var(--green);}
.bear{background:rgba(255,23,68,0.1);color:var(--red);}
.neut{background:rgba(255,214,0,0.1);color:var(--gold);}

/* RISK */
.risk-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:10px;}
.ri{text-align:center;}
.ri-lbl{font-size:10px;color:var(--muted);margin-bottom:4px;}
.ri-val{font-family:'JetBrains Mono',monospace;font-size:14px;font-weight:700;}
.rbar{height:4px;background:var(--border);border-radius:2px;overflow:hidden;}
.rb-inner{height:100%;border-radius:2px;}

/* TRADE BTNS */
.tbns{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:20px;}
.tbn{padding:16px;border-radius:14px;border:none;font-family:'Outfit',sans-serif;font-size:14px;font-weight:700;cursor:pointer;transition:all 0.2s;display:flex;flex-direction:column;align-items:center;gap:3px;}
.tbn small{font-size:10px;font-weight:400;opacity:0.7;}
.tbn-long{background:rgba(0,230,118,0.12);color:var(--green);border:1px solid rgba(0,230,118,0.3);}
.tbn-short{background:rgba(255,23,68,0.12);color:var(--red);border:1px solid rgba(255,23,68,0.3);}
.tbn-long:hover{background:var(--green);color:#040810;}
.tbn-short:hover{background:var(--red);color:white;}
.tbn-save{grid-column:1/-1;background:var(--card2);color:var(--muted2);border:1px solid var(--border);padding:12px;border-radius:12px;font-size:13px;font-weight:600;cursor:pointer;transition:all 0.2s;font-family:'Outfit',sans-serif;}
.tbn-save:hover{border-color:var(--accent2);color:var(--accent2);}

/* MARKETS */
.msearch{display:flex;align-items:center;gap:8px;background:var(--card);border:1px solid var(--border);border-radius:12px;padding:10px 14px;margin-bottom:12px;}
.msearch input{flex:1;background:none;border:none;outline:none;color:var(--text
